<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业与竞品调研日报</title>
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface2: #f0ebe3;
    --border: #e0d8cc;
    --text: #2c2c2c;
    --text2: #6b6560;
    --accent: #4f6fcf;
    --accent2: #2b6a9e;
    --accent-light: rgba(79,111,207,0.08);
    --green: #2e8b57;
    --orange: #c9761e;
    --red: #c0392b;
    --purple: #7b4f9e;
    --teal: #1d7a6e;
    --tag-bg: rgba(0,0,0,0.04);
    --fs-base: 16px;
    --fs-card: 15px;
    --fs-small: 13px;
    --fs-title: 16px;
    --fs-section: 17px;
    --fs-h1: 24px;
  }
  body.font-sm {
    --fs-base: 14px; --fs-card: 13px; --fs-small: 11px;
    --fs-title: 14px; --fs-section: 15px; --fs-h1: 20px;
  }
  body.font-lg {
    --fs-base: 18px; --fs-card: 17px; --fs-small: 14px;
    --fs-title: 18px; --fs-section: 19px; --fs-h1: 28px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-size: var(--fs-base);
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .header h1 { font-size: var(--fs-h1); font-weight: 700; color: var(--text); }
  .header h1 span { color: var(--accent); }
  .header-subtitle { font-size: var(--fs-small); color: var(--text2); margin-top: 2px; }
  .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .header-actions button, .fs-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: var(--fs-small);
    transition: all 0.2s;
    font-family: inherit;
    line-height: 1.4;
  }
  .header-actions button:hover, .fs-btn:hover { background: var(--border); color: var(--text); }
  .fs-group { display:inline-flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .fs-group button {
    background: var(--surface);
    border:none; color:var(--text2); cursor:pointer;
    padding:6px 10px; font-size:14px; font-family:inherit; line-height:1;
    transition:all 0.15s;
  }
  .fs-group button:hover { background:var(--surface2); }
  .fs-group button.active { background:var(--accent); color:#fff; }

  .team-badge {
    display: inline-flex; align-items:center; gap:4px;
    background: var(--accent-light); color: var(--accent);
    font-size: var(--fs-small); padding: 4px 12px;
    border-radius: 20px; font-weight: 500;
  }

  .tab-bar { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 10px 18px; border: none; background: transparent;
    color: var(--text2); cursor: pointer; font-size: 14px;
    font-weight: 500; border-bottom: 3px solid transparent;
    transition: all 0.2s; white-space: nowrap; font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); border-radius: 8px 8px 0 0; }
  .tab-btn.active {
    color: var(--accent); border-bottom-color: var(--accent);
    background: var(--bg); border-radius: 8px 8px 0 0; font-weight: 600;
  }
  .tab-btn .badge-new {
    font-size: 10px; background: var(--red); color: #fff;
    border-radius: 8px; padding: 2px 6px; margin-left: 6px; vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .main { max-width: 960px; margin: 0 auto; padding: 28px 40px 80px; }
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .section { margin-bottom: 32px; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 2px solid var(--border); cursor: pointer; user-select: none;
  }
  .section-header:hover { opacity: 0.8; }
  .section-icon { width: 30px; height: 30px; border-radius: 8px;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0; background:var(--accent-light); }
  .section-title { font-size: var(--fs-section); font-weight: 600; flex: 1; color: var(--text); }
  .section-toggle { font-size: 12px; color: var(--text2); transition: transform 0.2s; }
  .section.collapsed .section-body { display: none; }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }

  /* Competitor Filter Pills */
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .filter-bar .filter-label {
    font-size: var(--fs-small); color: var(--text2); font-weight: 600;
    padding: 4px 0; margin-right: 4px;
  }
  .filter-pill {
    padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); cursor: pointer;
    font-size: var(--fs-small); font-family: inherit; transition: all 0.2s;
  }
  .filter-pill:hover { border-color: var(--accent); color: var(--accent); }
  .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Cards */
  .news-card, .competitor-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 22px; margin-bottom: 12px;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .news-card:hover, .competitor-card:hover {
    border-color: var(--accent); box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .news-card[data-hidden="true"] { display: none; }

  .card-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    margin-bottom: 6px; display: inline-block; padding: 3px 10px; border-radius: 4px;
  }
  .label-hot { background: rgba(192,57,43,0.08); color: var(--red); }
  .label-info { background: rgba(79,111,207,0.08); color: var(--accent); }
  .label-warn { background: rgba(201,118,30,0.08); color: var(--orange); }
  .label-green { background: rgba(46,139,87,0.08); color: var(--green); }
  .label-purple { background: rgba(123,79,158,0.08); color: var(--purple); }
  .label-teal { background: rgba(29,122,110,0.08); color: var(--teal); }

  .card-title {
    font-size: var(--fs-title); font-weight: 600; margin-bottom: 6px; line-height: 1.5; color: var(--text);
  }
  .card-title a { color: var(--accent2); text-decoration: none; font-size: var(--fs-small); }
  .card-title a:hover { text-decoration: underline; }
  .card-meta { font-size: var(--fs-small); color: var(--text2); margin-bottom: 8px; }
  .card-meta span { margin-right: 14px; }
  .card-body { font-size: var(--fs-card); color: var(--text2); line-height: 1.8; }
  .card-body strong { color: var(--text); font-weight: 600; }

  .tag {
    display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 4px;
    background: var(--tag-bg); color: var(--text2); margin: 2px 4px 2px 0;
  }
  .tag-red { background: rgba(192,57,43,0.08); color: var(--red); }
  .tag-blue { background: rgba(79,111,207,0.08); color: var(--accent); }
  .tag-green { background: rgba(46,139,87,0.08); color: var(--green); }
  .tag-orange { background: rgba(201,118,30,0.08); color: var(--orange); }

  /* Highlights */
  .highlights-card {
    background: linear-gradient(135deg, rgba(79,111,207,0.04), rgba(43,106,158,0.04));
    border: 1px solid rgba(79,111,207,0.2);
    border-radius: 10px; padding: 18px 22px; margin-bottom: 14px;
  }
  .highlights-card ol {
    margin: 0; padding-left: 20px;
  }
  .highlights-card ol li {
    padding: 6px 0; font-size: var(--fs-card); line-height: 1.7; color: var(--text);
  }
  .highlights-card ol li strong { color: var(--accent); }

  /* Tables */
  .data-table { width: 100%; border-collapse: collapse; font-size: var(--fs-small); margin: 8px 0; }
  .data-table th {
    background: var(--surface2); padding: 10px 14px; text-align: left;
    font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px;
    color: var(--text2); border-bottom: 1px solid var(--border);
  }
  .data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
  .data-table tr:hover td { background: var(--accent-light); }
  .data-table .store-link { color: var(--accent2); text-decoration: none; font-size: 12px; }
  .data-table .store-link:hover { text-decoration: underline; }

  /* Alert Banner */
  .alert-banner {
    background: linear-gradient(135deg, rgba(192,57,43,0.04), rgba(201,118,30,0.04));
    border: 1px solid rgba(201,118,30,0.25); border-radius: 10px;
    padding: 16px 20px; margin-bottom: 12px;
  }
  .alert-banner .alert-title { font-weight: 600; color: var(--orange); margin-bottom: 6px; font-size: 15px; }
  .alert-banner .alert-body { font-size: var(--fs-card); color: var(--text2); line-height: 1.8; }

  /* Calendar */
  .cal-title { font-size: var(--fs-title); font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
  .cal-header { text-align: center; font-weight: 600; font-size: 12px; color: var(--text2); padding: 6px 0; }
  .cal-day {
    text-align: center; padding: 6px 4px; border-radius: 6px;
    font-size: var(--fs-small); color: var(--text2); position: relative; min-height: 56px;
  }
  .cal-day .day-num { font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .cal-day .day-event {
    font-size: 10px; color: var(--accent); line-height: 1.3;
    background: var(--accent-light); border-radius: 3px; padding: 1px 4px; margin-top: 2px;
  }
  .cal-day .day-event.hot { color: var(--red); background: rgba(192,57,43,0.08); }
  .cal-day .day-event.orange { color: var(--orange); background: rgba(201,118,30,0.08); }
  .cal-day.empty { visibility: hidden; }
  .cal-day.today { background: var(--accent-light); border-radius: 6px; }
  .cal-legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text2); margin-top: 8px; }
  .cal-legend span { display: flex; align-items: center; gap: 4px; }
  .cal-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .cal-legend .dot.dot-red { background: var(--red); }
  .cal-legend .dot.dot-accent { background: var(--accent); }
  .cal-legend .dot.dot-orange { background: var(--orange); }

  /* Back to Top */
  .back-top {
    position: fixed; bottom: 32px; right: 32px;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: all 0.3s;
    z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .back-top.show { opacity: 1; pointer-events: auto; }
  .back-top:hover { background: var(--surface2); color: var(--text); }

  .source-footer {
    margin-top: 48px; padding-top: 20px; border-top: 2px solid var(--border);
    font-size: var(--fs-small); color: var(--text2); text-align: center;
  }

  @media (max-width: 768px) {
    .header { padding: 14px 16px 0; }
    .main { padding: 16px; }
    .header-top { flex-direction: column; align-items: flex-start; }
    .header h1 { font-size: 20px; }
    .tab-btn { padding: 8px 12px; font-size: 13px; }
    .news-card, .competitor-card { padding: 14px 16px; }
    .back-top { bottom: 16px; right: 16px; width: 40px; height: 40px; }
    .cal-day { min-height: 44px; font-size: 12px; }
  }
  @media print {
    .header { position: static; }
    .tab-bar { display: flex !important; }
    .day-panel { display: block !important; }
    .section-body { display: block !important; }
    .back-top { display: none !important; }
    .filter-bar { display: none !important; }
    body { background: #fff; color: #333; font-size: 14px; }
    .news-card, .competitor-card { background: #fafafa; border-color: #ddd; box-shadow: none; }
    .data-table th { background: #f0f0f0; }
    .alert-banner { background: #fff8f0; }
    .header-actions button, .fs-group { display: none; }
  }
</style>
</head>
<body>

<div class="header" id="appHeader">
  <div class="header-top">
    <div class="header-left">
      <div>
        <h1>📊 <span>行业与竞品</span>调研日报</h1>

    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <div class="fs-group">
        <button onclick="setFontSize('sm')" title="小字">A⁻</button>
        <button onclick="setFontSize('md')" class="active" title="中字">A</button>
        <button onclick="setFontSize('lg')" title="大字">A⁺</button>
      </div>
      <div class="header-actions">
        <button onclick="toggleAll()">◈ 全部展开/折叠</button>
        <button onclick="window.print()">⎙ 打印</button>
      </div>
    </div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
</div>

<div class="main" id="appMain"></div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

function renderTabs() {
  const bar = document.getElementById('tabBar');
  // data tab + weekly review tab
  let html = '';
  reportData.forEach((r, i) => {
    const isLatest = i === reportData.length - 1;
    const active = i === reportData.length - 1;
    const badge = isLatest ? '<span class="badge-new">NEW</span>' : '';
    html += `<button class="tab-btn${active?' active':''}" onclick="switchTab(${i})">${r.date} ${r.weekday}${badge}</button>`;
  });
  // weekly review tab
  html += `<button class="tab-btn" onclick="switchTab('weekly')" id="tab-weekly">📋 本周回顾</button>`;
  bar.innerHTML = html;
}

function renderCalendars() {
  let html = '';
  Object.keys(calendarEvents).forEach(monthKey => {
    const cal = calendarEvents[monthKey];
    const [year, month] = monthKey.split('-').map(Number);
    const firstDay = new Date(year, month - 1, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month, 0).getDate();
    const today = new Date();
    const isThisMonth = today.getFullYear() === year && (today.getMonth() + 1) === month;

    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    let grid = '<div class="cal-grid">';
    dayNames.forEach(d => { grid += `<div class="cal-header">${d}</div>`; });
    for (let i = 0; i < firstDay; i++) { grid += '<div class="cal-day empty"></div>'; }
    for (let d = 1; d <= daysInMonth; d++) {
      const events = cal.events[d] || [];
      const isToday = isThisMonth && today.getDate() === d;
      let dayHTML = `<div class="cal-day${isToday?' today':''}">`;
      dayHTML += `<div class="day-num">${d}</div>`;
      events.forEach(e => {
        dayHTML += `<div class="day-event ${e.cls}">${e.text}</div>`;
      });
      dayHTML += '</div>';
      grid += dayHTML;
    }
    grid += '</div>';

    html += `
      <div class="news-card" style="margin-bottom:14px;">
        <div class="cal-title" style="margin-bottom:8px;">${cal.title}</div>
        ${grid}
        <div class="cal-legend">
          <span><span class="dot dot-red"></span> 重要节日 / 热点</span>
          <span><span class="dot dot-accent"></span> 游戏上线 / 测试</span>
          <span><span class="dot dot-orange"></span> 行业活动 / 纪念日</span>
          <span style="opacity:0.6;">· 今日: 高亮背景</span>
        </div>
      </div>`;
  });
  return html;
}

function sectionHTML(s, dayIdx) {
  const open = s.defaultOpen ? '' : 'collapsed';
  let bodyHTML = '';

  s.items.forEach(item => {
    if (item.type === 'news') {
      const urlPart = item.url ? ` <a href="${item.url}" target="_blank" style="font-size:var(--fs-small);color:var(--accent2);text-decoration:none;">🔗 来源</a>` : '';
      const tagsAttr = item.tags ? item.tags.join(' ') : '';
      bodyHTML += `
        <div class="news-card" data-tags="${tagsAttr}">
          <span class="card-label ${item.label.cls}">${item.label.text}</span>
          <div class="card-title">${item.title}${urlPart}</div>
          <div class="card-meta"><span>📅 ${item.date}</span><span>📰 ${item.source}</span></div>
          <div class="card-body">${item.body.replace(/\n\n/g, '</div><div class="card-body" style="margin-top:8px;">')}</div>
        </div>`;
    } else if (item.type === 'competitor') {
      const entriesHTML = item.entries.map(e => {
        const tagsAttr = e.tags ? e.tags.join(' ') : '';
        return `
        <div data-tags="${tagsAttr}">
          <div style="margin-bottom:10px; padding-bottom:10px; border-bottom: 1px solid var(--border);">
            <div style="font-weight:600;font-size:var(--fs-title);color:var(--text);margin-bottom:4px;">
              ${e.name} <span class="tag ${e.status.includes('预警')?'tag-red':e.status.includes('优先')?'tag-orange':e.status.includes('上线')?'tag-green':e.status.includes('未')?'tag-blue':'tag-blue'}">${e.status}</span>
            </div>
            <div class="card-body" style="margin-bottom:2px;">${e.detail}</div>
            <div style="font-size:var(--fs-small);color:var(--text2);margin-top:4px;"><span style="color:var(--orange);">▸</span> 最新动态：${e.movement}</div>
          </div>
        </div>`;
      }).join('');
      bodyHTML += `
        <div class="competitor-card">
          <div style="font-size:var(--fs-title);font-weight:600;color:var(--accent);margin-bottom:12px;">${item.category}</div>
          ${entriesHTML}
        </div>`;
    } else if (item.type === 'table') {
      const ths = item.headers.map(h => `<th>${h}</th>`).join('');
      const trs = item.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
      const titleLine = item.tableTitle ? `<div style="font-size:var(--fs-title);font-weight:600;margin-bottom:4px;">${item.tableTitle}</div>` : '';
      const subtitleLine = item.tableSubtitle ? `<div style="font-size:var(--fs-small);color:var(--text2);margin-bottom:8px;">${item.tableSubtitle}</div>` : '';
      const sourceLine = item.source ? `<div style="font-size:var(--fs-small);color:var(--text2);margin-top:8px;">📊 ${item.sourceUrl ? `<a href="${item.sourceUrl}" target="_blank" style="color:var(--accent2);text-decoration:none;">${item.source}</a>` : item.source}</div>` : '';
      bodyHTML += `
        <div class="news-card">
          ${titleLine}${subtitleLine}
          <table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>
          ${sourceLine}
        </div>`;
    } else if (item.type === 'alert') {
      bodyHTML += `
        <div class="alert-banner">
          <div class="alert-title">${item.title}</div>
          <div class="alert-body">${item.body}</div>
        </div>`;
    } else if (item.type === 'calendar') {
      // Calendar handled separately - will be injected in renderPanels
      return; // skip here
    }
  });

  // Handle calendar items separately
  const hasCalendar = s.items.some(it => it.type === 'calendar');
  if (hasCalendar) {
    bodyHTML = renderCalendars() + bodyHTML;
  }

  return `
    <div class="section" id="sec-${dayIdx}-${s.id}">
      <div class="section-header" onclick="toggleSection('sec-${dayIdx}-${s.id}')">
        <div class="section-icon">${s.icon}</div>
        <div class="section-title">${s.title}</div>
        <div class="section-toggle">▼</div>
      </div>
      <div class="section-body">${bodyHTML}</div>
    </div>
  `;
}

function renderHighlights(h) {
  if (!h || h.length === 0) return '';
  const items = h.map(item => `<li>${item}</li>`).join('');
  return `
    <div class="highlights-card">
      <div style="font-weight:600;font-size:var(--fs-title);margin-bottom:10px;color:var(--accent);">📌 今日速览</div>
      <ol>${items}</ol>
    </div>`;
}

function renderFilterBar(tags) {
  if (!tags || tags.length === 0) return '';
  let pills = tags.map(t => {
    const label = {tombbusters:'Tomb Busters',petitplanet:'Petit Planet',afkjourney:'AFK Journey',afkarena:'AFK Arena',swordstaff:'Sword x Staff',heartopia:'Heartopia',lovania:'Lovania',hauntedheadline:'Haunted Headline',acecraft:'Acecraft',supercell:'Supercell',hoyoverse:'米哈游',nintendo:'任天堂',scopely:'Scopely',playtika:'Playtika',blizzard:'Blizzard',epic:'Epic Games',sega:'Sega/ Rovio',rovio:'Sega/ Rovio',sensortower:'Sensor Tower',engine:'引擎'}[t] || t;
    return `<button class="filter-pill" data-filter="${t}" onclick="toggleFilter('${t}')">${label}</button>`;
  }).join('');
  return `<div class="filter-bar"><span class="filter-label">🏷️ 竞品筛选</span><button class="filter-pill active" data-filter="all" onclick="toggleFilter('all')">全部</button>${pills}</div>`;
}

function getDayTags(dayData) {
  const tags = new Set();
  dayData.sections.forEach(s => {
    s.items.forEach(item => {
      if (item.tags) item.tags.forEach(t => tags.add(t));
      if (item.entries) {
        item.entries.forEach(e => { if (e.tags) e.tags.forEach(t => tags.add(t)); });
      }
    });
  });
  // Remove generic tags
  return Array.from(tags).filter(t => !['lovania','hauntedheadline','acecraft'].includes(t)).sort();
}

function renderWeeklyReview() {
  const allAlerts = [];
  reportData.forEach((r, di) => {
    r.sections.forEach(s => {
      if (s.id === 'alerts') {
        s.items.forEach(item => {
          if (item.type === 'alert') {
            allAlerts.push({ date: r.date, weekday: r.weekday, title: item.title, body: item.body });
          }
        });
      }
    });
  });

  if (allAlerts.length === 0) return '<div class="news-card"><div class="card-body">本周暂无预警记录。</div></div>';

  let html = '';
  // Group by date
  const grouped = {};
  allAlerts.forEach(a => {
    if (!grouped[a.date]) grouped[a.date] = [];
    grouped[a.date].push(a);
  });

  Object.keys(grouped).sort().reverse().forEach(date => {
    html += `<div style="margin-bottom:16px;"><div style="font-weight:600;font-size:var(--fs-title);color:var(--text);margin-bottom:8px;">📅 ${date}</div>`;
    grouped[date].forEach(a => {
      html += `<div class="alert-banner" style="margin-bottom:8px;">
          <div class="alert-title">${a.title}</div>
          <div class="alert-body">${a.body}</div>
        </div>`;
    });
    html += '</div>';
  });

  return html;
}

function renderPanels() {
  const main = document.getElementById('appMain');
  let html = '';
  reportData.forEach((r, i) => {
    const active = i === reportData.length - 1 ? ' active' : '';
    const dayTags = getDayTags(r);

    let sectionsHTML = '';
    r.sections.forEach(s => {
      sectionsHTML += sectionHTML(s, i);
    });

    const h = renderHighlights(r.highlights);
    const filterBar = renderFilterBar(dayTags);
    const sourceNote = `<div class="source-footer">📡 信息源：PocketGamer.biz · PocketGamer.com · Mobilegamer.biz · trends24.in · 数据为公开报道汇总，仅供参考</div>`;

    html += `<div class="day-panel${active}" data-day="${i}">${h}${filterBar}${sectionsHTML}${sourceNote}</div>`;
  });

  // Weekly review panel (hidden by default)
  html += `<div class="day-panel" id="panel-weekly">
    <div class="highlights-card" style="margin-bottom:20px;">
      <div style="font-weight:600;font-size:var(--fs-title);margin-bottom:4px;color:var(--accent);">📋 本周回顾</div>
      <div style="font-size:var(--fs-small);color:var(--text2);">所有日报的"特别预警"自动聚合</div>
    </div>
    ${renderWeeklyReview()}
    <div class="source-footer">📡 自动聚合自所有日报的预警板块</div>
  </div>`;

  main.innerHTML = html;
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));

  if (idx === 'weekly') {
    document.getElementById('tab-weekly').classList.add('active');
    document.getElementById('panel-weekly').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[idx].classList.add('active');
    document.querySelectorAll('.day-panel')[idx].classList.add('active');
  }
  // Reset filters when switching tabs
  resetFilter();
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
}

function toggleAll() {
  const all = document.querySelectorAll('.section');
  const anyOpen = Array.from(all).some(s => !s.classList.contains('collapsed'));
  all.forEach(s => s.classList.toggle('collapsed', anyOpen));
}

// Filter
let activeFilter = 'all';
function toggleFilter(tag) {
  activeFilter = (activeFilter === tag) ? 'all' : tag;
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.filter === activeFilter || (activeFilter === 'all' && p.dataset.filter === 'all'));
  });
  applyFilter();
}
function resetFilter() {
  activeFilter = 'all';
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.filter === 'all' || p.dataset.filter === 'all'));
  applyFilter();
}
function applyFilter() {
  if (activeFilter === 'all') {
    document.querySelectorAll('[data-tags]').forEach(el => el.style.display = '');
    document.querySelectorAll('.competitor-card > div > div').forEach(el => el.style.display = '');
    return;
  }
  document.querySelectorAll('[data-tags]').forEach(el => {
    const tags = (el.dataset.tags || '').split(' ');
    el.style.display = tags.includes(activeFilter) ? '' : 'none';
  });
  // Hide competitor sections that are now empty
  document.querySelectorAll('.competitor-card').forEach(card => {
    const visible = Array.from(card.querySelectorAll('[data-tags]')).some(el => el.style.display !== 'none');
    card.style.display = visible ? '' : 'none';
  });
}

// Font size
function setFontSize(size) {
  document.body.className = size === 'md' ? '' : `font-${size}`;
  document.querySelectorAll('.fs-group button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.fs-group button').forEach(b => {
    if ((size === 'sm' && b.textContent.includes('⁻')) ||
        (size === 'md' && b.textContent === 'A') ||
        (size === 'lg' && b.textContent.includes('⁺'))) {
      b.classList.add('active');
    }
  });
}

// Back to top
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);
});

// ============ INIT ============
renderTabs();
renderPanels();
</script>
