<html lang="zh-CN">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业与竞品调研日报</title>
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface2: #f0ebe3;
    --border: #e0d8cc;
    --text: #2c2c2c;
    --text2: #6b6560;
    --accent: #4f6fcf;
    --accent2: #2b6a9e;
    --accent-light: rgba(79,111,207,0.08);
    --green: #2e8b57;
    --orange: #c9761e;
    --red: #c0392b;
    --purple: #7b4f9e;
    --teal: #1d7a6e;
    --tag-bg: rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-size: 16px;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 40px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }
  .header-subtitle {
    font-size: 14px;
    color: var(--text2);
    margin-top: 2px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .header-actions button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .header-actions button:hover {
    background: var(--border);
    color: var(--text);
  }

  /* Tab Bar */
  .tab-bar {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 12px 22px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); border-radius: 8px 8px 0 0; }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--bg);
    border-radius: 8px 8px 0 0;
    font-weight: 600;
  }
  .tab-btn .badge-new {
    font-size: 10px;
    background: var(--red);
    color: #fff;
    border-radius: 8px;
    padding: 2px 6px;
    margin-left: 6px;
    vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* Main Content */
  .main { max-width: 960px; margin: 0 auto; padding: 32px 40px 80px; }
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  /* Section */
  .section { margin-bottom: 36px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { opacity: 0.8; }
  .section-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    background: var(--accent-light);
  }
  .section-title {
    font-size: 17px;
    font-weight: 600;
    flex: 1;
    color: var(--text);
  }
  .section-toggle {
    font-size: 12px;
    color: var(--text2);
    transition: transform 0.2s;
  }
  .section.collapsed .section-body { display: none; }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }

  /* Cards */
  .news-card, .insight-card, .competitor-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 14px;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .news-card:hover, .insight-card:hover, .competitor-card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .card-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 8px;
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
  }
  .label-hot { background: rgba(192,57,43,0.08); color: var(--red); }
  .label-info { background: rgba(79,111,207,0.08); color: var(--accent); }
  .label-warn { background: rgba(201,118,30,0.08); color: var(--orange); }
  .label-green { background: rgba(46,139,87,0.08); color: var(--green); }
  .label-purple { background: rgba(123,79,158,0.08); color: var(--purple); }
  .label-teal { background: rgba(29,122,110,0.08); color: var(--teal); }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.5;
    color: var(--text);
  }
  .card-title a {
    color: var(--accent2);
    text-decoration: none;
    font-size: 14px;
  }
  .card-title a:hover { text-decoration: underline; }
  .card-meta {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .card-meta span { margin-right: 16px; }
  .card-body {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.8;
  }
  .card-body strong { color: var(--text); font-weight: 600; }
  .card-body ul {
    list-style: none;
    padding: 0;
    margin: 6px 0;
  }
  .card-body ul li {
    padding: 3px 0 3px 18px;
    position: relative;
  }
  .card-body ul li::before {
    content: '·';
    position: absolute;
    left: 4px;
    color: var(--accent);
    font-weight: bold;
  }

  /* Tags */
  .tag {
    display: inline-block;
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--text2);
    margin: 2px 4px 2px 0;
  }
  .tag-red { background: rgba(192,57,43,0.08); color: var(--red); }
  .tag-blue { background: rgba(79,111,207,0.08); color: var(--accent); }
  .tag-green { background: rgba(46,139,87,0.08); color: var(--green); }
  .tag-orange { background: rgba(201,118,30,0.08); color: var(--orange); }

  /* Tables */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin: 8px 0;
  }
  .data-table th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .data-table tr:hover td { background: var(--accent-light); }
  .data-table .num { font-variant-numeric: tabular-nums; text-align: right; }

  /* Alert Banner */
  .alert-banner {
    background: linear-gradient(135deg, rgba(192,57,43,0.04), rgba(201,118,30,0.04));
    border: 1px solid rgba(201,118,30,0.25);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 14px;
  }
  .alert-banner .alert-title {
    font-weight: 600;
    color: var(--orange);
    margin-bottom: 6px;
    font-size: 15px;
  }
  .alert-banner .alert-body {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.8;
  }

  /* Source Footer */
  .source-footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 2px solid var(--border);
    font-size: 13px;
    color: var(--text2);
    text-align: center;
  }

  /* Team badge */
  .team-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* Responsive */
  @media (max-width: 768px) {
    body { font-size: 15px; }
    .header { padding: 16px 18px 0; }
    .main { padding: 20px 16px 60px; }
    .header-top { flex-direction: column; align-items: flex-start; }
    .header h1 { font-size: 20px; }
    .tab-btn { padding: 10px 14px; font-size: 14px; }
    .news-card, .competitor-card { padding: 16px; }
    .card-title { font-size: 15px; }
    .card-body { font-size: 14px; }
    .data-table { font-size: 13px; }
    .data-table th, .data-table td { padding: 8px 10px; }
  }

  /* Print */
  @media print {
    .header { position: static; }
    .tab-bar { display: flex !important; }
    .day-panel { display: block !important; }
    .section-body { display: block !important; }
    body { background: #fff; color: #333; font-size: 14px; }
    .news-card, .competitor-card { background: #fafafa; border-color: #ddd; break-inside: avoid; box-shadow: none; }
    .data-table th { background: #f0f0f0; }
    .alert-banner { background: #fff8f0; }
    .header-actions button { display: none; }
  }
</style>
</head>

// ============ RENDER ============
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = reportData.map((r, i) => {
    const isFirst = i === reportData.length - 1;
    const badge = isFirst ? '<span class="badge-new">NEW</span>' : '';
    return `<button class="tab-btn${i === reportData.length - 1 ? ' active' : ''}" onclick="switchTab(${i})">
      ${r.date} ${r.weekday}${badge}
    </button>`;
  }).join('');
}

function sectionHTML(s, dayIdx) {
  const open = s.defaultOpen ? '' : 'collapsed';
  let bodyHTML = '';

  s.items.forEach(item => {
    if (item.type === 'news') {
      const urlPart = item.url ? ` <a href="${item.url}" target="_blank" style="font-size:13px;color:var(--accent2);text-decoration:none;">🔗 来源</a>` : '';
      bodyHTML += `
        <div class="news-card">
          <span class="card-label ${item.label.cls}">${item.label.text}</span>
          <div class="card-title">${item.title}${urlPart}</div>
          <div class="card-meta"><span>📅 ${item.date}</span><span>📰 ${item.source}</span></div>
          <div class="card-body">${item.body}</div>
        </div>`;
    } else if (item.type === 'competitor') {
      const entriesHTML = item.entries.map(e => `
        <div style="margin-bottom:10px; padding-bottom:10px; border-bottom: 1px solid var(--border);">
          <div style="font-weight:600;font-size:15px;color:var(--text);margin-bottom:4px;">
            ${e.name} <span class="tag ${e.status.includes('预警')?'tag-red':e.status.includes('优先')?'tag-orange':e.status.includes('上线')?'tag-green':e.status.includes('未')?'tag-blue':'tag-blue'}">${e.status}</span>
          </div>
          <div class="card-body" style="margin-bottom:2px;">${e.detail}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:4px;"><span style="color:var(--orange);">▸</span> 动态：${e.movement}</div>
        </div>
      `).join('');
      bodyHTML += `
        <div class="competitor-card">
          <div style="font-size:15px;font-weight:600;color:var(--accent);margin-bottom:12px;">${item.category}</div>
          ${entriesHTML}
        </div>`;
    } else if (item.type === 'table') {
      const ths = item.headers.map(h => `<th>${h}</th>`).join('');
      const trs = item.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
      const sourceLine = item.source ? `<div style="font-size:13px;color:var(--text2);margin-top:8px;">📊 ${item.sourceUrl ? `<a href="${item.sourceUrl}" target="_blank" style="color:var(--accent2);text-decoration:none;">${item.source}</a>` : item.source}</div>` : '';
      bodyHTML += `
        <div class="news-card">
          <table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>
          ${sourceLine}
        </div>`;
    } else if (item.type === 'alert') {
      bodyHTML += `
        <div class="alert-banner">
          <div class="alert-title">${item.title}</div>
          <div class="alert-body">${item.body}</div>
        </div>`;
    }
  });

  return `
    <div class="section" id="sec-${dayIdx}-${s.id}">
      <div class="section-header" onclick="toggleSection('sec-${dayIdx}-${s.id}')">
        <div class="section-icon">${s.icon}</div>
        <div class="section-title">${s.title}</div>
        <div class="section-toggle">▼</div>
      </div>
      <div class="section-body">${bodyHTML}</div>
    </div>
  `;
}

function renderPanels() {
  const main = document.getElementById('appMain');
  main.innerHTML = reportData.map((r, i) => {
    const active = i === reportData.length - 1 ? ' active' : '';
    const sectionsHTML = r.sections.map(s => sectionHTML(s, i)).join('');
    const sourceNote = `<div class="source-footer">📡 信息源：PocketGamer.biz · PocketGamer.com · Mobilegamer.biz · 数据为公开报道汇总，仅供参考</div>`;
    return `<div class="day-panel${active}" data-day="${i}">${sectionsHTML}${sourceNote}</div>`;
  }).join('');
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.day-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
}

function toggleAll() {
  const all = document.querySelectorAll('.section');
  const someOpen = Array.from(all).some(s => !s.classList.contains('collapsed'));
  all.forEach(s => s.classList.toggle('collapsed', someOpen));
}

// ============ INIT ============
renderTabs();
renderPanels();
